name: Hexo Blog Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Patch theme branding
        run: |
          sed -i \
            -e 's|欢迎使用安知鱼|欢迎使用Wilsonc|g' \
            -e 's|By 安知鱼 V|By Wilsonc V|g' \
            -e 's|Powered by 安知鱼|Powered by Wilsonc|g' \
            node_modules/hexo-theme-anzhiyu/layout/includes/anzhiyu/log-js.pug

      - name: Build static site
        run: npx hexo generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          full_commit_message: ${{ github.event.head_commit.message }}

      - name: Deploy to Oracle VM (via Cloudflare Tunnel)
        run: |
          mkdir -p ~/.ssh
          cat <<< "${{ secrets.ORACLE_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan 130.61.138.38 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to Oracle
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./public/ \
            ubuntu@130.61.138.38:/var/www/blog/
