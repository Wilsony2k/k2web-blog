name: Hexo Blog Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy-to-oracle:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout published content
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Show size
        run: du -sh .

      - name: Deploy to Oracle VM (via Cloudflare Tunnel)
        run: |
          mkdir -p ~/.ssh
          cat <<< "${{ secrets.ORACLE_SSH_KEY_B64 }}" | base64 -d > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan 130.61.138.38 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync to Oracle
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ \
            ubuntu@130.61.138.38:/var/www/blog/
